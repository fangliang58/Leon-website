  /* ================================================
     JOURNEY PAGE — Horizontal Timeline
     ================================================ */
  html, body { height: 100%; overflow: hidden; }

  .journey-page {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ---- Header ---- */
  .journey-header {
    flex-shrink: 0;
    padding: 2.5rem 4rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 2rem;
  }
  .journey-header h1 { font-size: 2.2rem; line-height: 1; }
  .journey-subtitle {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ---- Scroll container ---- */
  .htl-scroll {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 4rem;
    display: flex;
    align-items: center;
    scrollbar-width: thin;
    scrollbar-color: var(--border-medium) transparent;
  }
  .htl-scroll::-webkit-scrollbar { height: 3px; }
  .htl-scroll::-webkit-scrollbar-track { background: transparent; }
  .htl-scroll::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

  /* ---- Track ---- */
  .htl-track {
    position: relative;
    /* width set by JS based on last node x */
    height: 280px;
    flex-shrink: 0;
  }

  /* ---- Timeline line ---- */
  .htl-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    transform: translateY(-50%);
    background: linear-gradient(to right,
      transparent, var(--border-medium) 2%,
      var(--border-medium) 98%, transparent);
    z-index: 1;
  }

  /* ------------------------------------------------
     NODE LAYOUT
     Key principle: the DOT is always precisely on
     the line. The label extends above (for .above
     nodes) or below (for .below nodes).
     ------------------------------------------------ */
  .htl-node {
    position: absolute;
    /* left set inline */
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.3s ease;
  }

  /* ABOVE: label → connector → dot (top to bottom)
     Position: bottom edge of the node sits at (50% - half-dot) so the dot
     center is exactly at 50% = the line */
  .htl-node.above {
    bottom: calc(50% - 25px);   /* 25px = half of 50px dot */
    flex-direction: column;    /* label first (top), dot last (bottom = on line) */
  }

  /* BELOW: dot → connector → label (top to bottom)
     Position: top edge of the node sits at (50% - half-dot) */
  .htl-node.below {
    top: calc(50% - 25px);
    flex-direction: column;    /* dot first (top = on line), label last (bottom) */
  }

  /* ---- Dot (now a logo badge) ---- */
  .htl-dot {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--border-light);
    box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 11;
  }
  /* Logo image inside dot */
  .htl-dot-img {
    width: 46px;
    height: 46px;
    object-fit: contain;
    border-radius: 50%;
    display: block;
  }
  /* Init badge inside dot (fallback) */
  .htl-dot-init {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-size: 0.6rem;
    font-weight: 800;
    color: white;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .htl-node.is-event .htl-dot {
    border-radius: 6px;
    transform: rotate(45deg);
  }
  .htl-node.is-event .htl-dot .htl-dot-img,
  .htl-node.is-event .htl-dot .htl-dot-init {
    transform: rotate(-45deg);
  }

  /* ---- Connector ---- */
  .htl-connector {
    width: 1px;
    height: 36px;
    background: var(--border-light);
    flex-shrink: 0;
    transition: background 0.28s ease;
  }

  /* ---- Compact label ---- */
  .htl-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: transform 0.28s ease;
    padding: 0 4px;
  }

  .htl-label-top {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3px;
  }

  /* Legacy logo classes (unused — logos now live inside .htl-dot) */
  .htl-logo { display: none; }
  .htl-logo-init {
    display: none;
    letter-spacing: 0;
  }

  .htl-org {
    font-family: var(--font-serif);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    line-height: 1.25;
  }
  /* Two-line org name support */
  .htl-org-line2 {
    font-family: var(--font-serif);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    line-height: 1.25;
    display: block;
    text-align: center;
  }
  .htl-role {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1.3;
  }

  /* ---- Year markers — placed at bottom of track ---- */
  .htl-year {
    position: absolute;
    bottom: 10px;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--border-medium);
    letter-spacing: 0.1em;
    user-select: none;
    z-index: 2;
  }

  /* ---- Hover: dim siblings ---- */
  .htl-track.has-active .htl-node:not(.active) {
    opacity: 0.1;
  }

  /* ---- Active node ---- */
  .htl-node.active .htl-dot {
    transform: scale(1.12);
    border-color: currentColor;
    box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 25%, transparent),
                0 4px 14px rgba(0,0,0,0.15);
  }
  .htl-node.active.is-event .htl-dot {
    transform: rotate(45deg) scale(1.12);
  }
  .htl-node.active .htl-label {
    transform: scale(1.06);
  }
  .htl-node.active .htl-org,
  .htl-node.active .htl-org-line2 {
    color: var(--text-primary);
  }
  .htl-node.active .htl-connector {
    background: var(--border-medium);
  }

  /* Pulse for "Now" */
  @keyframes tlPulse {
    0%   { box-shadow: 0 0 0 0 rgba(184,160,140,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(184,160,140,0); }
    100% { box-shadow: 0 0 0 0 rgba(184,160,140,0); }
  }
  .htl-node.is-now .htl-dot {
    animation: tlPulse 2.2s ease-out infinite;
  }

  /* ================================================
     DRAWER PANEL (slides in from right)
     ================================================ */
  .htl-drawer {
    position: fixed;
    right: 0;
    top: 65px;   /* below nav */
    bottom: 0;
    width: 380px;
    background: var(--bg-primary);
    border-left: 1px solid var(--border-light);
    box-shadow: -8px 0 40px rgba(58, 54, 50, 0.08);
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 800;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    pointer-events: none;
  }
  .htl-drawer.visible {
    transform: translateX(0);
    pointer-events: auto;
  }

  /* Colored accent bar at top */
  .drawer-accent-bar {
    height: 4px;
    width: 100%;
    flex-shrink: 0;
    transition: background 0.2s ease;
  }

  /* Scrollable content area */
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 2.2rem 2.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;

  .drawer-body::-webkit-scrollbar { width: 3px; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 0.75rem;

  }

            'AI/LLM research pipeline: prompt design, model evaluation, and data analysis',
            'Bridging practitioner experience with academic entrepreneurship research'
          ]
        }
      ]
    },
    {
      id: 'kellogg',
      orgLines: ['Kellogg School', 'of Management'],
      role: 'Part-time RA',
      period: 'Dec 2025 – Present',
      location: 'Remote',
      color: '#4E2A84',
      side: 'above',
      x: 1680,
      isNow: true,
      logo: 'assets/images/logos/kellogg.png',
      about: null,
      sections: [
        {
          label: 'Role & Supervisor',
          items: [
            'Part-time Research Assistant at Kellogg School of Management, Northwestern University',
            'Supervised by Prof. Kylie Jiwon Hwang'
          ]
        },
        {
          label: 'Research Focus',
          items: [
            'Entrepreneurship, labor reintegration, and employment discrimination',
            'Quantitative analysis using Stata regression and spatial analysis',
            'Investigating barriers to re-entry in entrepreneurial labor markets'
          ]
        }
      ]
    }
  ];

  const TL_YEARS = [
    { label: '2016', x: 100 },
    { label: '2020', x: 310 },
    { label: '2021', x: 700 },
    { label: '2022', x: 900 },
    { label: '2023', x: 1080 },
    { label: '2024', x: 1280 },
    { label: '2025', x: 1480 },
    { label: '2026', x: 1680 },
  ];

  /* ============================================================
     BUILD TIMELINE
     ============================================================ */
  (function () {
    const track       = document.getElementById('htlTrack');
    const drawer      = document.getElementById('htlDrawer');
    const drawerIdle  = document.getElementById('drawerIdle');
    const drawerDetail= document.getElementById('drawerDetail');
    const accentBar   = document.getElementById('drawerAccentBar');

    /* Set track width */
    const lastX = TL_NODES[TL_NODES.length - 1].x;
    track.style.width = (lastX + 140) + 'px';

    /* ---- Year markers ---- */
    TL_YEARS.forEach(yr => {
      const el = document.createElement('div');
      el.className = 'htl-year';
      el.textContent = yr.label;
      el.style.left = yr.x + 'px';
      track.appendChild(el);
    });

    /* ---- Nodes ---- */
    TL_NODES.forEach(data => {
      const node = document.createElement('div');
      const classes = ['htl-node', data.side];
      if (data.isEvent) classes.push('is-event');
      if (data.isNow)   classes.push('is-now');
      node.className = classes.join(' ');
      node.style.left  = data.x + 'px';
      node.style.color = data.color;

      /* Logo inside dot — SVG image, no external API */
      let dotInnerHTML = '';
      if (data.logo) {
        dotInnerHTML = `<img class="htl-dot-img" src="${data.logo}" alt="${data.orgLines[0]}">`;
      }

      /* Org name (supports two lines) */
      let orgHTML = '';
      if (data.orgLines.length === 1) {
        orgHTML = `<span class="htl-org">${data.orgLines[0]}</span>`;
      } else {
        orgHTML = data.orgLines.map((l, i) =>
          i === 0
            ? `<span class="htl-org">${l}</span>`
            : `<span class="htl-org-line2">${l}</span>`
        ).join('');
      }

      const labelHTML = `
        <div class="htl-label">
          <div class="htl-label-top">
            <div style="display:flex;flex-direction:column;align-items:center">${orgHTML}</div>
          </div>
          <span class="htl-role">${data.role}</span>
        </div>
      `;

      const connectorHTML = `<div class="htl-connector"></div>`;
      const dotHTML       = `<div class="htl-dot">${dotInnerHTML}</div>`;

      /* For "above": label → connector → dot (top to bottom) */
      /* For "below": dot → connector → label (top to bottom) */
      node.innerHTML = data.side === 'above'
        ? labelHTML + connectorHTML + dotHTML
        : dotHTML   + connectorHTML + labelHTML;

      track.appendChild(node);

      /* ---- Hover events ---- */
      node.addEventListener('mouseenter', () => {
        activateNode(node);
        openDrawer(data);
      });
      node.addEventListener('mouseleave', e => {
        if (!drawer.contains(e.relatedTarget)) scheduleHide();
      });
    });

    /* Keep drawer alive while mouse is inside it */
    drawer.addEventListener('mouseenter', () => cancelHide());
    drawer.addEventListener('mouseleave', e => {
      const active = track.querySelector('.htl-node.active');
      if (active && !active.contains(e.relatedTarget)) scheduleHide();
    });

    /* ---- Activate / deactivate node ---- */
    function activateNode(node) {
      track.querySelectorAll('.htl-node.active').forEach(n => n.classList.remove('active'));
      track.classList.add('has-active');
      node.classList.add('active');
    }

    /* ---- Hide with small delay so mouse can travel to drawer ---- */
    let hideTimer  = null;
    let resetTimer = null;   /* tracks the post-transition content-clear */
    function scheduleHide() {
      hideTimer = setTimeout(hideAll, 160);
    }
    function cancelHide() {
      clearTimeout(hideTimer);
    }
    function hideAll() {
      drawer.classList.remove('visible');
      track.querySelectorAll('.htl-node.active').forEach(n => n.classList.remove('active'));
      track.classList.remove('has-active');
      /* Reset drawer to idle after slide-out transition */
      resetTimer = setTimeout(() => {
        drawerIdle.classList.remove('hidden');
        drawerDetail.classList.remove('visible');
        drawerDetail.innerHTML = '';
        accentBar.style.background = 'var(--border-light)';
      }, 400);
    }

    /* ---- Open drawer with content ---- */
    function openDrawer(data) {
      cancelHide();
      clearTimeout(resetTimer);   /* cancel any stale content-clear so it won't blank the new content */

      /* Accent bar color */
      accentBar.style.background = data.color;

      /* Build detail HTML */
      drawerDetail.style.setProperty('--accent-color', data.color);

      /* Role: support two-line full form via drawerRole */
      const roleHTML = data.drawerRole || data.role;

      /* About block (optional) */
      const aboutHTML = data.about
        ? `<div class="drawer-about">${data.about}</div>`
        : '';

      /* Content: multi-section (sections[]) or single list (highlights[]) */
      let contentHTML = '';
      if (data.sections && data.sections.length) {
        contentHTML = data.sections.map(sec => `
          <div class="drawer-highlights-label">${sec.label}</div>
          <ul class="drawer-highlights">
            ${sec.items.map(h => `<li>${h}</li>`).join('')}
          </ul>`).join('');
      } else if (data.highlights && data.highlights.length) {
        contentHTML = `
          <div class="drawer-highlights-label">Key Contributions</div>
          <ul class="drawer-highlights">
            ${data.highlights.map(h => `<li>${h}</li>`).join('')}
          </ul>`;
      }

      const logoImgHTML = data.logo
        ? `<img class="drawer-header-logo" src="${data.logo}" alt="${data.orgLines[0]}">`
        : '';

      drawerDetail.innerHTML = `
        <div class="drawer-header">
          <div class="drawer-header-top">
            ${logoImgHTML}
            <div>
              <div class="drawer-org-name">${data.orgLines.join(' ')}</div>
              <div class="drawer-role-name">${roleHTML}</div>
            </div>
          </div>
          <div class="drawer-meta">${data.period} &middot; ${data.location}</div>
        </div>
        ${aboutHTML}
        ${contentHTML}
      `;

      drawerIdle.classList.add('hidden');
      drawerDetail.classList.add('visible');
      drawer.classList.add('visible');
      /* Scroll detail back to top */
      drawer.querySelector('.drawer-body').scrollTop = 0;
    }

  })();
  </script>
</body>
</html>
